<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼接相片簡易排版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #4a5568;
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-align: center;
        }

        .instructions {
            color: #718096;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
            padding: 0 10px;
        }

        .upload-btn {
            background-color: #4f46e5;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
            display: inline-block;
        }

        #file-input {
            display: none;
        }

        /* 網頁預覽外框：內襯白色背景當作白邊間隙 */
        .grid-container {
            position: relative;
            width: 90vw;       
            max-width: 450px;  
            min-height: 150px;
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            overflow: hidden;
            transition: height 0.3s ease;
        }

        /* 網頁預覽相片塊 */
        .preview-block {
            position: absolute;
            background-size: cover;
            background-position: center;
            box-sizing: border-box;
        }

        .placeholder-text {
            padding: 60px 0;
            text-align: center;
            color: #a0aec0;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .text-input-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 90vw;
            max-width: 450px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .input-row:last-child {
            margin-bottom: 0;
        }

        .input-row label {
            width: 70px;
            font-weight: bold;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .input-row input, .input-row select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            background-color: #fff;
            box-sizing: border-box;
        }

        .input-row input:focus, .input-row select:focus {
            border-color: #4f46e5;
        }

        #other-item-row {
            display: none; 
            margin-top: -4px;
            margin-bottom: 12px;
        }

        .download-btn {
            background-color: #10b981;
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            font-size: 1rem;
            transition: background 0.2s;
            display: none; 
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            -webkit-appearance: none;
            margin-bottom: 30px;
        }

        .footer-author {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 10px;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        #canvas {
            display: none;
        }
    </style>
</head>
<body>

    <h1>簡易相片拼接</h1>
    <div class="instructions">可選擇1~9張照片，依照選擇張數自動平分版面拼接。</div>

    <label class="upload-btn" for="file-input">📱 選取照片 (1~9張)</label>
    <input type="file" id="file-input" accept="image/*" multiple>

    <div class="grid-container" id="grid-container">
        <div class="placeholder-text" id="placeholder-text">📸 尚未選取照片</div>
    </div>

    <div class="text-input-container">
        <div class="input-row">
            <label>分隊：</label>
            <input type="text" id="squad-text" placeholder="例如：麻豆分隊">
        </div>
        
        <div class="input-row">
            <label>日期：</label>
            <input type="text" id="date-text" placeholder="例如：6/1">
        </div>
        
        <div class="input-row">
            <label>項目：</label>
            <select id="item-select">
                <option value="">-- 請選擇項目 --</option>
                <option value="車輛器材保養">車輛器材保養</option>
                <option value="救護技能強化訓練">救護技能強化訓練</option>
                <option value="體技能訓練">體技能訓練</option>
                <option value="其他">其他 (自行填寫)...</option>
            </select>
        </div>

        <div class="input-row" id="other-item-row">
            <label></label>
            <input type="text" id="other-item-text" placeholder="請輸入自訂項目內容">
        </div>
    </div>

    <button class="download-btn" id="download-btn">儲存拼接照片</button>

    <div class="footer-author">麻豆分隊  莊伯瀚  製作</div>

    <canvas id="canvas"></canvas>

    <script>
        const fileInput = document.getElementById('file-input');
        const gridContainer = document.getElementById('grid-container');
        const placeholderText = document.getElementById('placeholder-text');
        const downloadBtn = document.getElementById('download-btn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const squadInput = document.getElementById('squad-text');
        const dateInput = document.getElementById('date-text');
        const itemSelect = document.getElementById('item-select');
        const otherItemRow = document.getElementById('other-item-row');
        const otherItemInput = document.getElementById('other-item-text');

        let uploadedImages = [];

        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            dateInput.value = `${today.getMonth() + 1}/${today.getDate()}`;

            if (localStorage.getItem('saved_squad')) {
                squadInput.value = localStorage.getItem('saved_squad');
            }
            itemSelect.value = "";
            otherItemRow.style.display = 'none';
            otherItemInput.value = "";
        });

        itemSelect.addEventListener('change', () => {
            if (itemSelect.value === '其他') {
                otherItemRow.style.display = 'flex';
                otherItemInput.value = ""; 
                otherItemInput.focus();
            } else {
                otherItemRow.style.display = 'none';
            }
        });

        squadInput.addEventListener('input', () => {
            localStorage.setItem('saved_squad', squadInput.value);
        });

        fileInput.addEventListener('change', handleFiles);

        // 核心進化：動態計算每排照片寬度，保證每一排都「完美撐滿」且相片「維持正方形」
        function getFlexLayout(count) {
            const gap = 25;        // 相片間隙
            const totalWidth = 2400; // 固定大畫布總寬度為 2400px
            
            let rowConfigs = []; 
            switch (count) {
                case 1: rowConfigs = [1]; break;
                case 2: rowConfigs = [2]; break;
                case 3: rowConfigs = [2, 1]; break;
                case 4: rowConfigs = [2, 2]; break;
                case 5: rowConfigs = [3, 2]; break;
                case 6: rowConfigs = [3, 3]; break;
                case 7: rowConfigs = [3, 2, 2]; break;
                case 8: rowConfigs = [3, 3, 2]; break;
                case 9: rowConfigs = [3, 3, 3]; break;
            }

            const rects = [];
            let currentY = gap; // 從最頂部的間隙開始累加高度

            for (let r = 0; r < rowConfigs.length; r++) {
                const imgCountInRow = rowConfigs[r];
                
                // 動態計算這一排每張正方形相片分到的寬度（平分撐滿總寬度，並扣除間隙）
                const photoSize = (totalWidth - (imgCountInRow + 1) * gap) / imgCountInRow;
                
                for (let c = 0; c < imgCountInRow; c++) {
                    const x = gap + c * (photoSize + gap);
                    rects.push({
                        x: x,
                        y: currentY,
                        w: photoSize,
                        h: photoSize // 高度等於寬度，確保絕對正方形
                    });
                }
                
                // 這一排畫完後，將 Y 軸下移「這一排的相片高度 + 下一個間隙」
                currentY += photoSize + gap;
            }

            // 最終累加出來的 currentY 就是相片牆的總高度
            const totalHeight = currentY; 

            return { totalWidth, totalHeight, rects };
        }

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            if (files.length > 9) {
                alert(`最多選取 9 張照片！`);
                return;
            }

            const blocks = gridContainer.querySelectorAll('.preview-block');
            blocks.forEach(b => b.remove());
            placeholderText.style.display = 'none';

            uploadedImages = [];
            let loadedCount = 0;
            const targetCount = files.length;
            
            const layout = getFlexLayout(targetCount);

            // 根據動態算出來的總長寬比例，調整網頁上手機預覽外框的高度
            const containerWidth = gridContainer.clientWidth;
            const scale = containerWidth / layout.totalWidth;
            gridContainer.style.height = (layout.totalHeight * scale) + 'px';

            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        uploadedImages.push(img);
                        
                        const div = document.createElement('div');
                        div.className = 'preview-block';
                        div.style.backgroundImage = `url(${event.target.result})`;
                        
                        // 計算每張正方形圖在手機網頁預覽畫面上的精確百分比位置
                        const box = layout.rects[index];
                        div.style.left = (box.x / layout.totalWidth * 100) + '%';
                        div.style.top = (box.y / layout.totalHeight * 100) + '%';
                        div.style.width = (box.w / layout.totalWidth * 100) + '%';
                        div.style.height = (box.h / layout.totalHeight * 100) + '%';
                        
                        gridContainer.appendChild(div);

                        loadedCount++;
                        if (loadedCount === targetCount) { 
                            downloadBtn.style.display = 'block'; 
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        downloadBtn.addEventListener('click', () => {
            if (uploadedImages.length === 0) return;

            const textSpace = 300; // 底部紀錄文字區塊固定預留高度
            const layout = getFlexLayout(uploadedImages.length);

            // 設定 Canvas 總輸出尺寸，文字高度精確疊加
            canvas.width = layout.totalWidth;
            canvas.height = layout.totalHeight + textSpace;

            // 背景填滿白色
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製每張經計算後平分撐滿的正方形照片
            uploadedImages.forEach((img, index) => {
                const box = layout.rects[index];
                drawCoverImage(ctx, img, box.x, box.y, box.w, box.h);
            });

            // 文字欄位結合
            let finalItem = itemSelect.value;
            if (finalItem === '其他') {
                finalItem = otherItemInput.value.trim();
            }
            const squad = squadInput.value.trim();
            const date = dateInput.value.trim();
            const combinedText = squad + date + finalItem;

            // 繪製底部大字
            if (combinedText) {
                ctx.fillStyle = '#1e293b'; 
                ctx.font = 'bold 120px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const textX = canvas.width / 2;
                const textY = layout.totalHeight + (textSpace / 2);
                
                ctx.fillText(combinedText, textX, textY);
            }

            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = `${combinedText || '平分撐滿拼接'}.jpg`;
            link.href = dataURL;
            link.click();
        });

        function drawCoverImage(ctx, img, x, y, w, h) {
            const imgRatio = img.width / img.height;
            const canvasRatio = w / h;
            let sx, sy, sw, sh;
            if (imgRatio > canvasRatio) {
                sh = img.height; sw = img.height * canvasRatio;
                sx = (img.width - sw) / 2; sy = 0;
            } else {
                sw = img.width; sh = img.width / canvasRatio;
                sx = 0; sy = (img.height - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
        }
    </script>
</body>
</html>
